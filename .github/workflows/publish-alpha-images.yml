name: Publish alpha images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BLOCK_IMAGE: ghcr.io/seaweedfs/seaweed-block
  CSI_IMAGE: ghcr.io/seaweedfs/seaweed-block-csi

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
            {
              echo "block_tags<<EOF"
              echo "${BLOCK_IMAGE}:${version}"
              echo "${BLOCK_IMAGE}:alpha"
              echo "${BLOCK_IMAGE}:sha-${short_sha}"
              echo "EOF"
              echo "csi_tags<<EOF"
              echo "${CSI_IMAGE}:${version}"
              echo "${CSI_IMAGE}:alpha"
              echo "${CSI_IMAGE}:sha-${short_sha}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "block_tags<<EOF"
              echo "${BLOCK_IMAGE}:alpha"
              echo "${BLOCK_IMAGE}:sha-${short_sha}"
              echo "EOF"
              echo "csi_tags<<EOF"
              echo "${CSI_IMAGE}:alpha"
              echo "${CSI_IMAGE}:sha-${short_sha}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push block image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/k8s/g15b/Dockerfile.sw-block
          push: true
          tags: ${{ steps.tags.outputs.block_tags }}

      - name: Build and push CSI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/k8s/g15b/Dockerfile.blockcsi
          push: true
          tags: ${{ steps.tags.outputs.csi_tags }}
