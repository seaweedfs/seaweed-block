apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: sw-block-example
provisioner: block.csi.seaweedfs.com
volumeBindingMode: Immediate
allowVolumeExpansion: false
parameters:
  replicationFactor: "1"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sw-block-example-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: sw-block-example
  resources:
    requests:
      storage: 1Mi
