apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: sw-block-dynamic
provisioner: block.csi.seaweedfs.com
volumeBindingMode: Immediate
allowVolumeExpansion: false
parameters:
  replicationFactor: "1"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sw-block-dynamic-v1
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: sw-block-dynamic
  resources:
    requests:
      storage: 256Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: sw-block-dynamic-smoke
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          dd if=/dev/urandom of=/data/payload.bin bs=1M count=32
          sha256sum /data/payload.bin > /data/payload.sha256
          sync
          sha256sum -c /data/payload.sha256
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: sw-block-dynamic-v1
