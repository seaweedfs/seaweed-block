apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: sw-block-dynamic
provisioner: block.csi.seaweedfs.com
volumeBindingMode: Immediate
allowVolumeExpansion: false
parameters:
  replicationFactor: "1"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sw-block-dynamic-v1
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: sw-block-dynamic
  resources:
    requests:
      storage: 512Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: sw-block-dynamic-smoke
spec:
  restartPolicy: Never
  securityContext:
    fsGroup: 999
  containers:
    - name: pgbench
      image: postgres:16-alpine
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          export PGDATA=/data/pgdata
          export PGHOST=/tmp
          export PGPORT=55432
          mkdir -p "$PGDATA"
          chown -R postgres:postgres /data
          su postgres -c "initdb -D '$PGDATA' --auth=trust --no-locale"
          {
            echo "listen_addresses = ''"
            echo "unix_socket_directories = '/tmp'"
            echo "port = 55432"
            echo "shared_buffers = 64MB"
            echo "max_connections = 64"
            echo "fsync = on"
            echo "synchronous_commit = on"
          } >> "$PGDATA/postgresql.conf"
          su postgres -c "pg_ctl -D '$PGDATA' -l /data/postgres.log start"
          trap 'su postgres -c "pg_ctl -D \"$PGDATA\" -m fast stop" || true' EXIT
          su postgres -c "createdb -h /tmp -p 55432 benchdb"
          su postgres -c "pgbench -h /tmp -p 55432 -i -s 1 benchdb" | tee /data/pgbench-init.log
          su postgres -c "pgbench -h /tmp -p 55432 -c 4 -j 2 -T 60 benchdb" | tee /data/pgbench-run.log
          grep 'tps =' /data/pgbench-run.log | tee /data/pgbench-tps.log
          sync
          tail -n +1 /data/pgbench-tps.log
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: sw-block-dynamic-v1
